<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aliasor JS Tests</title>
  <style>
    body { font-family: monospace; padding: 1rem; }
    .pass { color: green; }
    .fail { color: red; font-weight: bold; }
    #summary { margin-top: 1rem; font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Aliasor JS Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <script src="../aliasor.js"></script>
  <script>
    const results = document.getElementById("results");
    const summary = document.getElementById("summary");
    let passed = 0;
    let failed = 0;

    function assert(actual, expected, label) {
      const ok = actual === expected;
      const div = document.createElement("div");
      if (ok) {
        div.className = "pass";
        div.textContent = `✓ ${label}`;
        passed++;
      } else {
        div.className = "fail";
        div.textContent = `✗ ${label} — expected "${expected}", got "${actual}"`;
        failed++;
      }
      results.appendChild(div);
    }

    async function runTests() {
      // Load the test alias_key.json (same one used by Python tests)
      const resp = await fetch("alias_key.json");
      const data = await resp.json();
      const aliasor = new Aliasor(data);

      // === Uncompress ===
      assert(aliasor.uncompress("BA.1"), "B.1.1.529.1", "uncompress BA.1");
      assert(aliasor.uncompress("AY.4"), "B.1.617.2.4", "uncompress AY.4");
      assert(aliasor.uncompress("AY.4.3.2"), "B.1.617.2.4.3.2", "uncompress AY.4.3.2");
      assert(aliasor.uncompress("B.1"), "B.1", "uncompress B.1");
      assert(aliasor.uncompress("B"), "B", "uncompress B");
      assert(aliasor.uncompress(""), "", "uncompress empty");

      // === Compress ===
      assert(aliasor.compress("B.1.1.529.1"), "BA.1", "compress B.1.1.529.1");
      assert(aliasor.compress("B.1.617.2.4"), "AY.4", "compress B.1.617.2.4");
      assert(aliasor.compress("B.1.617.2.4.3.1"), "AY.4.3.1", "compress B.1.617.2.4.3.1");
      assert(aliasor.compress("B.1.617.2"), "B.1.617.2", "compress B.1.617.2");
      assert(aliasor.compress("B.1"), "B.1", "compress B.1");
      assert(aliasor.compress("B"), "B", "compress B");
      assert(aliasor.compress(""), "", "compress empty");

      // === Recombinants pass through ===
      assert(aliasor.uncompress("XA.1"), "XA.1", "recombinant uncompress XA.1");
      assert(aliasor.compress("XA.1"), "XA.1", "recombinant compress XA.1");

      // === Double alias ===
      assert(aliasor.compress("B.1.1.529.5.3.1.1"), "BE.1", "double alias compress");
      assert(aliasor.uncompress("BE.1"), "B.1.1.529.5.3.1.1", "double alias uncompress");

      // === Parent ===
      assert(aliasor.parent("B.1.1.529.1"), "B.1.1.529", "parent B.1.1.529.1");
      assert(aliasor.parent("BQ.1") || "", "", "parent BQ.1 (BQ not in test data)");
      assert(aliasor.parent("XAA"), "", "parent XAA");
      assert(aliasor.parent(""), "", "parent empty");
      assert(aliasor.parent("A"), "", "parent A");
      assert(aliasor.parent("B"), "", "parent B");
      assert(aliasor.parent("C.1"), "B.1.1.1", "parent C.1");

      // === Partial compress (up_to) ===
      assert(aliasor.partialCompress("B.1.1.529.1.2", 0), "B.1.1.529.1.2", "partial up_to=0");
      assert(aliasor.partialCompress("B.1.1.529.2.75.1.2", 1), "BA.2.75.1.2", "partial up_to=1");
      // BL not in test data, so up_to=2 would use full compress
      assert(aliasor.partialCompress("B.1.1.529.2.75.1.2", 2), "BG.75.1.2", "partial up_to=2 (test data)");

      // === Partial compress (accepted_aliases) ===
      assert(
        aliasor.partialCompress("B.1.1.529.1.2", 0, new Set(["BA", "AZ"])),
        "BA.1.2",
        "partial accepted BA,AZ on B.1.1.529.1.2"
      );
      assert(
        aliasor.partialCompress("B.1.617.2.3", 0, new Set(["BA", "AZ"])),
        "B.1.617.2.3",
        "partial accepted BA,AZ on B.1.617.2.3"
      );
      assert(
        aliasor.partialCompress("B.1.1.529.2.75.1.2", 0, new Set(["BA"])),
        "BA.2.75.1.2",
        "partial accepted BA on B.1.1.529.2.75.1.2"
      );
      assert(
        aliasor.partialCompress("B", 0, new Set(["BA"])),
        "B",
        "partial accepted BA on B"
      );

      // === Partial compress (combination) ===
      assert(
        aliasor.partialCompress("B.1.1.529.1.2", 1, new Set(["BA", "AZ"])),
        "BA.1.2",
        "partial combo up_to=1 accepted=BA,AZ on B.1.1.529.1.2"
      );
      assert(
        aliasor.partialCompress("B.1.617.2.3", 1, new Set(["BA", "AZ"])),
        "AY.3",
        "partial combo up_to=1 accepted=BA,AZ on B.1.617.2.3"
      );

      // Summary
      summary.textContent = `${passed} passed, ${failed} failed`;
      summary.className = failed > 0 ? "fail" : "pass";
    }

    runTests();
  </script>
</body>
</html>
